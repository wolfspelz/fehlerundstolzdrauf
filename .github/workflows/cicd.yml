name: CI/CD

on:
  push:
    branches: [deployment]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            wolfspelz/fehlerundstolzdrauf:latest
            wolfspelz/fehlerundstolzdrauf:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOSTNAME }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            docker image pull wolfspelz/fehlerundstolzdrauf
            docker container stop fehlerundstolzdrauf-prod
            docker container prune -f
            mkdir -p /home/wolf/fehlerundstolzdrauf/data
            docker run -d --name fehlerundstolzdrauf-prod --restart unless-stopped -e LETSENCRYPT_HOST=fehlerundstolzdrauf.de -e VIRTUAL_HOST=fehlerundstolzdrauf.de -e VIRTUAL_PORT=80 -e ADMIN_TOKEN=${{ secrets.ADMIN_TOKEN }} -v /home/wolf/fehlerundstolzdrauf/data:/data --expose=80 --network=web -it wolfspelz/fehlerundstolzdrauf
            docker image prune -f
